<!DOCTYPE html>
<!--

  Accessibility: ARIA 1.2 Compliant (OER Ready)
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lo Shu Enigma - Version 1.0 | pivari.com</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c0392b">
    <style>
        :root { --primary: #c0392b; --gold: #f1c40f; --dark: #121212; --light: #f4f4f4; }
        body { font-family: 'Georgia', serif; background: var(--dark); color: var(--light); display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: env(safe-area-inset-top) 20px; overflow-x: hidden; }
        
        .controls { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; width: 100%; max-width: 600px; }
        select, .info-trigger { background: var(--gold); border: none; padding: 10px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; color: var(--dark); font-size: 1rem; }
        .info-trigger { background: transparent; border: 2px solid var(--gold); color: var(--gold); }
        
        .app-container { width: 100%; max-width: 500px; text-align: center; }
        #welcome-view, .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border-left: 5px solid var(--gold); min-height: 400px; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: fadeIn 0.4s ease-out; }
        
        .step-icon { font-size: 4rem; margin-bottom: 15px; }
        .grid { display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 320px; margin: 25px auto; background: var(--gold); padding: 10px; border-radius: 12px; }
        .cell { background: #fff; color: #222; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: clamp(1.5rem, 8vw, 2.5rem); font-weight: bold; border-radius: 8px; cursor: pointer; user-select: none; border: none; width: 100%; }
        .cell.selected { outline: 5px solid var(--primary); transform: scale(1.05); z-index: 2; aria-selected: "true"; }
        
        #doc-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark); z-index: 2000; overflow-y: auto; padding: 30px; box-sizing: border-box; }
        .theory-content { max-width: 700px; margin: 0 auto; line-height: 1.6; text-align: left; }
        .math-block { background: #000; padding: 15px; border-radius: 8px; text-align: center; margin: 20px 0; border: 1px dashed var(--gold); color: var(--gold); }

        .math-formula { font-style: italic; font-family: "Times New Roman", serif; font-size: 1.4rem; display: inline-flex; align-items: center; justify-content: center; width: 100%; }
        .fraction { display: inline-block; vertical-align: middle; text-align: center; margin: 0 5px; }
        .fraction > span { display: block; padding: 0 5px; }
        .fraction span.fdn { border-top: 2px solid var(--gold); }
        
        button.main-btn { background: var(--gold); border: none; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; border-radius: 50px; cursor: pointer; margin-top: 20px; color: var(--dark); transition: transform 0.2s; }
        button.main-btn:active { transform: scale(0.95); }

        footer { margin-top: auto; padding: 20px; font-size: 0.8rem; color: rgba(255,255,255,0.4); text-align: center; }
        footer a { color: var(--gold); text-decoration: none; }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <!-- Live region for screen readers -->
    <div id="aria-announcer" class="sr-only" aria-live="polite"></div>

    <header class="controls" role="toolbar" aria-label="Game controls">
        <select id="langSelect" onchange="loadLang(this.value)" aria-label="Select Language">
            <option value="en" selected>English</option>
            <option value="it">Italiano</option>
        </select>
        <select id="voiceSelect" aria-label="Select Narrator Voice"></select>
        <button class="info-trigger" onclick="navigateTo('theory')" id="info-btn" aria-haspopup="dialog">ℹ️ Theory</button>
    </header>

    <main class="app-container">
        <section id="welcome-view" aria-labelledby="welcome-title">
            <div class="step-icon" aria-hidden="true">🐢</div>
            <h1 id="welcome-title"></h1>
            <p id="welcome-subtitle"></p>
            <button class="main-btn" id="start-btn" onclick="startExperience()"></button>
        </section>

        <section id="story-view" style="display:none;" aria-live="assertive">
            <h1 id="main-title" style="color: var(--gold); font-size: 1.5rem;"></h1>
            <div class="card" role="region" aria-label="Story moment">
                <span id="story-icon" class="step-icon" aria-hidden="true"></span>
                <p id="story-text" style="font-size: 1.1rem;"></p>
                <button class="main-btn" id="btn-next" onclick="nextStep()"></button>
            </div>
        </section>

        <section id="game-view" style="display:none;">
            <p id="game-instr" role="status"></p>
            <div class="grid" id="puzzle-grid" role="grid" aria-label="Lo Shu Magic Square"></div>
            <div id="win-message" style="color: var(--gold); font-weight: bold; margin-top: 20px; display: none;" role="alert"></div>
        </section>
    </main>

    <footer>
        Version 1.0 | Released under MIT License | <a href="https://pivari.com" target="_blank">pivari.com</a>
    </footer>

    <div id="doc-overlay" role="dialog" aria-modal="true" aria-labelledby="doc-title">
        <button class="main-btn" style="background: var(--primary); color: white; width: 100%; margin-bottom: 20px;" onclick="navigateTo('game')" id="close-doc-btn"></button>
        <h2 id="doc-title" style="color: var(--gold); text-align: center;"></h2>
        <div id="doc-content-area"></div>
    </div>

    <script>
        let currentStep = 0, trans = {}, puzzleData = [1,2,3,4,5,6,7,8,9], firstSelection = null;
        const synth = window.speechSynthesis;
        const announcer = document.getElementById('aria-announcer');

        function announce(msg) { announcer.textContent = msg; }

        async function handleRouting() {
            const params = new URLSearchParams(window.location.search);
            const isTheory = params.get('v') === 'theory';
            document.getElementById('doc-overlay').style.display = isTheory ? 'block' : 'none';
            if (isTheory) {
                const lang = document.documentElement.lang || 'en';
                const res = await fetch(`./languages/theory_${lang}.html`);
                document.getElementById('doc-content-area').innerHTML = await res.text();
                document.getElementById('doc-title').textContent = trans.doc_title;
                document.getElementById('close-doc-btn').textContent = trans.close_info;
                document.getElementById('doc-overlay').focus();
            }
        }

        function navigateTo(view) {
            const url = new URL(window.location);
            if (view === 'game') url.searchParams.delete('v');
            else url.searchParams.set('v', view);
            window.history.pushState({}, '', url);
            handleRouting();
        }

        window.onpopstate = handleRouting;

        async function loadLang(lang) {
            const res = await fetch(`./languages/${lang}.json`);
            trans = await res.json();
            document.documentElement.lang = lang;
            document.getElementById('welcome-title').textContent = trans.title;
            document.getElementById('welcome-subtitle').textContent = trans.welcome_subtitle;
            document.getElementById('start-btn').textContent = trans.start_button;
            document.getElementById('main-title').textContent = trans.title;
            document.getElementById('info-btn').textContent = "ℹ️ " + trans.info_button;
            populateVoiceList();
            handleRouting();
        }

        function populateVoiceList() {
            const select = document.getElementById('voiceSelect');
            select.innerHTML = '';
            synth.getVoices().filter(v => v.lang.startsWith(document.documentElement.lang)).forEach(v => {
                const opt = document.createElement('option');
                opt.textContent = v.name;
                opt.setAttribute('data-name', v.name);
                select.appendChild(opt);
            });
        }
        speechSynthesis.onvoiceschanged = populateVoiceList;

        function speakText(text) {
            synth.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            const selectedName = document.getElementById('voiceSelect').selectedOptions[0]?.getAttribute('data-name');
            utter.voice = synth.getVoices().find(v => v.name === selectedName);
            utter.lang = document.documentElement.lang;
            synth.speak(utter);
            announce(text);
        }

        function startExperience() {
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('story-view').style.display = 'block';
            updateUI();
        }

        function updateUI() {
            const fullText = trans.steps[currentStep];
            const chars = Array.from(fullText);
            document.getElementById('story-icon').textContent = chars[0];
            const text = chars.slice(1).join("").trim();
            document.getElementById('story-text').textContent = text;
            document.getElementById('btn-next').textContent = (currentStep === trans.steps.length - 1) ? trans.start_game : trans.next_button;
            speakText(text);
        }

        function nextStep() {
            currentStep++;
            if (currentStep < trans.steps.length) updateUI();
            else initGame();
        }

        function initGame() {
            document.getElementById('story-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'block';
            document.getElementById('puzzle-grid').style.display = 'grid';
            document.getElementById('game-instr').textContent = trans.game_instructions;
            do { puzzleData.sort(() => Math.random() - 0.5); } while (checkWin());
            renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('puzzle-grid');
            grid.innerHTML = '';
            puzzleData.forEach((num, i) => {
                const btn = document.createElement('button');
                btn.className = 'cell' + (firstSelection === i ? ' selected' : '');
                btn.textContent = num;
                btn.setAttribute('role', 'gridcell');
                btn.setAttribute('aria-label', `Position ${i+1}, value ${num}`);
                
                btn.onclick = () => {
                    if (firstSelection === null) { 
                        firstSelection = i; 
                        announce(`Selected value ${num} at position ${i+1}`);
                        renderGrid(); 
                    }
                    else {
                        const firstVal = puzzleData[firstSelection];
                        [puzzleData[firstSelection], puzzleData[i]] = [puzzleData[i], puzzleData[firstSelection]];
                        announce(`Swapped ${firstVal} with ${num}`);
                        firstSelection = null; 
                        renderGrid();
                        if (checkWin()) {
                            const winEl = document.getElementById('win-message');
                            winEl.textContent = trans.win_message;
                            winEl.style.display = 'block';
                            speakText(trans.win_message);
                        }
                    }
                };
                grid.appendChild(btn);
            });
        }

        function checkWin() {
            const s = puzzleData;
            return [s[0]+s[1]+s[2], s[3]+s[4]+s[5], s[6]+s[7]+s[8], s[0]+s[3]+s[6], s[1]+s[4]+s[7], s[2]+s[5]+s[8], s[0]+s[4]+s[8], s[2]+s[4]+s[6]].every(v => v === 15);
        }
        window.onload = () => loadLang('en');
    </script>
</body>
</html>
